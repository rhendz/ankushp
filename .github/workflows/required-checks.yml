name: Required Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: required-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci (lint)"
          npm ci --prefer-offline --no-audit
          echo "::endgroup::"

      - name: Run lint
        run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.{js,jsx,ts,tsx}', 'components/**/*.{js,jsx,ts,tsx}', 'layouts/**/*.{js,jsx,ts,tsx}', 'lib/**/*.{js,jsx,ts,tsx}', 'next.config.js', 'tailwind.config.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: |
          echo "::group::npm ci (build)"
          npm ci --prefer-offline --no-audit
          echo "::endgroup::"

      - name: Run build
        run: npm run build

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci (test)"
          npm ci --prefer-offline --no-audit
          echo "::endgroup::"

      - name: Detect test script
        id: test-script
        run: |
          node -e "const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const hasTest=Boolean(pkg.scripts&&pkg.scripts.test);fs.appendFileSync(process.env.GITHUB_OUTPUT,`has_test=${hasTest}\n`);"

      - name: Run tests
        if: steps.test-script.outputs.has_test == 'true'
        run: npm run test

      - name: Skip tests when no script exists
        if: steps.test-script.outputs.has_test != 'true'
        run: echo "No test script found in package.json; skipping tests."
