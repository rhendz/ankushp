name: Feature
description: Propose a new user-facing capability or enhancement.
title: "feat: "
labels:
  - enhancement
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are we solving and for whom?
      placeholder: Users cannot...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define in-scope and out-of-scope items.
      placeholder: |
        In scope:
        - ...
        Out of scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
      description: What this issue explicitly does not include.
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Clear, testable outcomes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: Lint/build/tests/manual checks expected before merge.
      placeholder: |
        - npm run lint
        - npm run build
        - Manual smoke: ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Blockers
      description: Link related issues/PRs or state "None".
      placeholder: None
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks / Rollback
      description: Known risks and how to revert if needed.
      placeholder: Risk..., rollback by...
